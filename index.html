<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cornhole">
  <meta name="theme-color" content="#111111">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Cornhole Scorekeeper</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Fredoka', sans-serif; background: #111; color: #fff; }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes scorePop {
      0% { transform: scale(1); }
      30% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes confettiUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-140px) rotate(720deg); opacity: 0; }
    }
    @keyframes flash {
      0% { opacity: 0.15; }
      100% { opacity: 0; }
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    .panels {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: hidden;
      transition: filter 0.1s;
    }
    .panel:active { filter: brightness(1.1); }
    .panel--left {
      background: linear-gradient(170deg, #c89200ee, #c89200cc);
      border-right: 3px solid rgba(0,0,0,0.4);
    }
    .panel--right {
      background: linear-gradient(170deg, #1a4b8cee, #1a4b8ccc);
    }

    .panel__flash {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15);
      pointer-events: none;
      animation: flash 0.25s ease-out forwards;
    }

    .team-name {
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
      position: relative;
      z-index: 2;
    }
    .team-name-input {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      text-align: center;
      font-size: 16px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      padding: 6px 12px;
      width: 80%;
      max-width: 180px;
      outline: none;
      position: relative;
      z-index: 5;
    }

    .score {
      font-family: 'Lilita One', sans-serif;
      font-size: min(36vw, 200px);
      line-height: 1;
      color: #fff;
      text-shadow: 0 6px 24px rgba(0,0,0,0.4);
      position: relative;
      z-index: 2;
    }
    .score--pop { animation: scorePop 0.25s ease-out; }

    .tap-hint {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
    }

    .controls {
      background: rgba(0,0,0,0.6);
      padding: 14px 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: rgba(255,255,255,0.5);
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      outline: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .label {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      padding: 0 8px;
    }

    /* Winner overlay */
    .winner-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: bounceIn 0.5s ease;
    }
    .winner-content { text-align: center; padding: 40px; position: relative; }
    .winner-emoji { font-size: 56px; margin-bottom: 16px; }
    .winner-name {
      font-family: 'Lilita One', sans-serif;
      font-size: 42px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.4);
      margin-bottom: 8px;
    }
    .winner-sub {
      font-size: 20px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-bottom: 36px;
    }
    .winner-btn {
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      color: #fff;
      padding: 16px 40px;
      font-size: 18px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }
    .winner-btn:active { transform: scale(0.95); }

    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
    }
  </style>
</head>
<body>

<div class="app" id="app"></div>

<script>
  const WINNING_SCORE = 21;

  const state = {
    teams: [
      { name: 'Team 1', score: 0, color: '#c89200', accent: '#f5bf00' },
      { name: 'Team 2', score: 0, color: '#1a4b8c', accent: '#3b7ddd' },
    ],
    history: [],
    winner: null,
    editingName: null,
    flashing: null,
    popTeam: null,
  };

  function render() {
    const app = document.getElementById('app');
    const t = state.teams;
    const w = state.winner;

    let html = `<div class="panels">`;

    for (let i = 0; i < 2; i++) {
      const side = i === 0 ? 'left' : 'right';
      html += `<div class="panel panel--${side}" onclick="addPoint(${i})">`;

      if (state.flashing === i) {
        html += `<div class="panel__flash"></div>`;
      }

      if (state.editingName === i) {
        html += `<input class="team-name-input" id="name-input-${i}" value="${t[i].name}" 
          onclick="event.stopPropagation()" 
          onblur="saveName(${i})" 
          onkeydown="if(event.key==='Enter')saveName(${i})" autofocus>`;
      } else {
        html += `<div class="team-name" onclick="event.stopPropagation(); editName(${i})">${t[i].name}</div>`;
      }

      const popClass = state.popTeam === i ? ' score--pop' : '';
      html += `<div class="score${popClass}" id="score-${i}">${t[i].score}</div>`;

      if (w === null) {
        html += `<div class="tap-hint">TAP TO SCORE</div>`;
      }

      html += `</div>`;
    }

    html += `</div>`;

    // Controls
    html += `<div class="controls">
      <button class="btn" onclick="undo()" ${state.history.length === 0 ? 'disabled' : ''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10h10a5 5 0 0 1 0 10H9"/>
          <polyline points="7 14 3 10 7 6"/>
        </svg>
        Undo
      </button>
      <div class="label">First to ${WINNING_SCORE}</div>
      <button class="btn" onclick="resetGame()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>
        </svg>
        New Game
      </button>
    </div>`;

    // Winner overlay
    if (w !== null) {
      const colors = [t[w].accent, '#f59f00', '#51cf66', '#ff6b6b', '#748ffc'];
      let confetti = '';
      for (let i = 0; i < 14; i++) {
        const left = 10 + Math.random() * 80;
        const size = 6 + Math.random() * 6;
        const br = i % 2 === 0 ? '50%' : '2px';
        const dur = 1 + Math.random();
        const delay = Math.random() * 0.5;
        confetti += `<div class="confetti-piece" style="left:${left}%;top:45%;width:${size}px;height:${size}px;border-radius:${br};background:${colors[i % 5]};animation:confettiUp ${dur}s ease-out ${delay}s both"></div>`;
      }

      html += `<div class="winner-overlay">
        <div class="winner-content">
          ${confetti}
          <div class="winner-emoji">🏆</div>
          <div class="winner-name" style="color:${t[w].accent}">${t[w].name}</div>
          <div class="winner-sub">wins the game!</div>
          <button class="winner-btn" style="background:linear-gradient(145deg,${t[w].accent},${t[w].color});box-shadow:0 6px 24px ${t[w].color}66" onclick="resetGame()">Play Again</button>
        </div>
      </div>`;
    }

    app.innerHTML = html;
  }

  function addPoint(teamIndex) {
    if (state.winner !== null) return;
    state.teams[teamIndex].score++;
    state.history.push({ teamIndex, prevScore: state.teams[teamIndex].score - 1 });
    state.flashing = teamIndex;
    state.popTeam = teamIndex;

    if (state.teams[teamIndex].score >= WINNING_SCORE) {
      state.winner = teamIndex;
    }

    render();

    setTimeout(() => {
      state.flashing = null;
      state.popTeam = null;
      render();
    }, 250);
  }

  function undo() {
    if (state.history.length === 0) return;
    const last = state.history.pop();
    state.teams[last.teamIndex].score = last.prevScore;
    state.winner = null;
    render();
  }

  function resetGame() {
    state.teams[0].score = 0;
    state.teams[1].score = 0;
    state.history = [];
    state.winner = null;
    render();
  }

  function editName(index) {
    state.editingName = index;
    render();
    const input = document.getElementById('name-input-' + index);
    if (input) { input.focus(); input.select(); }
  }

  function saveName(index) {
    const input = document.getElementById('name-input-' + index);
    if (input) {
      state.teams[index].name = input.value.trim() || ('Team ' + (index + 1));
    }
    state.editingName = null;
    render();
  }

  render();
</script>
</body>
</html>
